[env:mega-freertos]
platform = atmelavr
board = megaatmega2560
framework = arduino
monitor_speed = 9600
monitor_echo = yes
monitor_eol = LF
monitor_filters = send_on_enter
build_flags = -DAPP_NAME=5
build_src_filter = +<*> -<lab0App/> -<lab1App/> -<lab1-2App/> -<lab2-1App/> -<lab2-2App/> -<ddKeypad/>
lib_deps =
    LiquidCrystal_I2C
    feilipu/FreeRTOS@^11.1.0-3